name: Publish Static Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate static entrypoint exists
        run: |
          test -f index.html
          test -d assets

      - name: Publish static files to hostinger-static branch
        run: |
          set -euo pipefail

          DEPLOY_BRANCH="hostinger-static"
          SOURCE_SHA="${GITHUB_SHA}"
          REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          TMP_DIR="$(mktemp -d)"

          if git ls-remote --exit-code --heads "${REPO_URL}" "${DEPLOY_BRANCH}" >/dev/null 2>&1; then
            git clone --branch "${DEPLOY_BRANCH}" "${REPO_URL}" "${TMP_DIR}"
          else
            git clone "${REPO_URL}" "${TMP_DIR}"
            cd "${TMP_DIR}"
            git checkout --orphan "${DEPLOY_BRANCH}"
            cd "${GITHUB_WORKSPACE}"
          fi

          find "${TMP_DIR}" -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +

          rsync -a \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".DS_Store" \
            --exclude "README.md" \
            --exclude "LICENSE" \
            "${GITHUB_WORKSPACE}/" "${TMP_DIR}/"

          cd "${TMP_DIR}"
          git add -A
          if git diff --cached --quiet; then
            echo "No deploy changes to publish."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Deploy static site from ${SOURCE_SHA}"
          git push origin "${DEPLOY_BRANCH}"
