    <style>
        :root {
            --hero-top-align: 135px;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            margin: 0;
            background: #161616;
            overflow-x: hidden;
        }

        .hero-banner {
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            background: #161616;
            padding-top: var(--hero-top-align);
        }

        .hero-banner .container {
            width: 100%;
        }

        .hero-banner .row {
            align-items: flex-start;
        }

        .hero-banner .col-lg-5.align-self-center {
            align-self: flex-start !important;
        }

        .hero-banner .hero-img img {
            width: 100%;
            height: auto;
            display: block;
        }

        .hero-cta-group {
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: auto;
            padding-top: 28px;
            align-items: center;
        }

        .hero-cta-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 260px;
            min-height: 72px;
            padding: 16px 24px;
            border-radius: 8px;
            color: #fff;
            font-weight: 700;
            font-size: 34px;
            line-height: 1;
            text-decoration: none;
            transition: transform 0.2s ease, opacity 0.2s ease;
            text-align: center;
        }

        .hero-cta-btn:hover {
            color: #fff;
            opacity: 0.92;
            transform: translateY(-1px);
        }

        .hero-cta-orange {
            background: #ff6600;
        }

        .hero-cta-brown {
            background: #7a4b2b;
        }

        .hero-cta-blue {
            background: #1f5f9b;
        }

        .hero-banner .hero-content {
            margin-top: 0;
            display: flex;
            flex-direction: column;
            min-height: min(62vw, 700px);
        }

        .hero-banner .hero-content h2 {
            margin-top: 0;
        }

        .hero-banner .shape {
            top: var(--hero-top-align) !important;
        }

        @media (max-width: 991px) {
            .hero-banner .hero-content {
                margin-top: 0;
                min-height: auto;
            }

            .hero-banner .shape {
                top: 295px !important;
            }

            .hero-banner {
                padding-top: 0;
            }

            .hero-cta-btn {
                min-width: 100%;
                min-height: 62px;
                font-size: 28px;
            }
        }
    </style>
